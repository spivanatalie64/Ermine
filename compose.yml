name: ermine

services:
  # MongoDB: Database
  database:
    image: docker.io/mongo
    restart: always
    volumes:
      - ./data/db:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Redis: Event message broker & KV store
  redis:
    image: docker.io/eqalpha/keydb
    restart: always

  # RabbitMQ: Internal message broker
  rabbit:
    image: docker.io/rabbitmq:4
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: rabbituser
      RABBITMQ_DEFAULT_PASS: rabbitpass
    volumes:
      - ./data/rabbit:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  # MinIO: S3-compatible storage server
  minio:
    image: docker.io/minio/minio
    command: server /data
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: minioautumn
      MINIO_ROOT_PASSWORD: minioautumn
      MINIO_DOMAIN: minio
    networks:
      default:
        aliases:
          - ermine-uploads.minio
          # legacy support:
          - attachments.minio
          - avatars.minio
          - backgrounds.minio
          - icons.minio
          - banners.minio
          - emojis.minio
    restart: always

  # Caddy: Web server
  caddy:
    image: docker.io/caddy
    restart: always
    env_file: .env.web
    ports:
      - "8085:80"
      - "8445:8445"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy-data:/data
      - ./data/caddy-config:/config

  # API server
  api:
    image: ghcr.io/erminechat/api:v0.11.1
    environment:
      - ERMINE_UNSAFE_NO_EMAIL=1
      - ERMINE_UNSAFE_NO_CAPTCHA=1
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Ermine.toml
        target: /Ermine.toml
    restart: always

  # Events service
  events:
    image: ghcr.io/erminechat/events:v0.11.1
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - type: bind
        source: ./Ermine.toml
        target: /Ermine.toml
    restart: always

  # File server
  autumn:
    image: ghcr.io/erminechat/file-server:v0.11.1
    depends_on:
      database:
        condition: service_healthy
      createbuckets:
        condition: service_started
    volumes:
      - type: bind
        source: ./Ermine.toml
        target: /Ermine.toml
    restart: always

  # Metadata and image proxy
  january:
    image: ghcr.io/erminechat/proxy:v0.11.1
    volumes:
      - type: bind
        source: ./Ermine.toml
        target: /Ermine.toml
    restart: always

  # Tenor proxy
  gifbox:
    image: ghcr.io/erminechat/gifbox:v0.11.1
    volumes:
      - type: bind
        source: ./Ermine.toml
        target: /Ermine.toml
    restart: always

  # Regular task daemon
  crond:
    image: ghcr.io/erminechat/crond:v0.11.1
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - type: bind
        source: ./Ermine.toml
        target: /Ermine.toml
    restart: always

  # Push notification daemon
  pushd:
    image: ghcr.io/erminechat/pushd:v0.11.1
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Ermine.toml
        target: /Ermine.toml
    restart: always

  # Vortex: Mediasoup-based voice service
  vortex:
    image: ghcr.io/erminechat/vortex:latest
    restart: always
    depends_on:
      database:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Ermine.toml
        target: /Ermine.toml
    ports:
      - "8500:8500"
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"

  # Create buckets for minio.
  createbuckets:
    image: docker.io/minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      while ! /usr/bin/mc ready minio; do
        /usr/bin/mc alias set minio http://minio:9000 minioautumn minioautumn;
        echo 'Waiting minio...' && sleep 1;
      done;
      /usr/bin/mc mb minio/ermine-uploads;
      exit 0;
      "

  # TURN server for reliable media connectivity
  coturn:
    image: docker.io/instrumentisto/coturn
    restart: always
    network_mode: host
    environment:
      - COTURN_ID=ermine-turn
      - COTURN_REALM=${DOMAIN:-localhost}
      - COTURN_SECRET=${TURN_SECRET:-erminesecret}
      - COTURN_MIN_PORT=50000
      - COTURN_MAX_PORT=50100
    command:
      - -n
      - --log-file=stdout
      - --min-port=50000
      - --max-port=50100
      - --realm=$${COTURN_REALM}
      - --static-auth-secret=$${COTURN_SECRET}
      - --external-ip=$${EXTERNAL_IP}

  # Web App
  web:
    image: ghcr.io/erminechat/for-web:addb6b7
    restart: always
    env_file: .env.web